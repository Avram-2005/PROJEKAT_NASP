BufferPoolConfig:
  #Amount of blocks stored 
  MaxSize: 8
  #Size of stored blocks
  #incorrect block size used to force init to fail 
  BlockSize: 4567
CacheConfig:
  #Amount of key value pairs stored
  MaxSize: 0
MemtableConfig:
  #Amount of memtable instances active at one point
  MaxCount: 0
  #Whether memtable uses hashmap, skiplist or btree
  Type: hashmap
  #How large the memtable can be in bytes
  MaxSizeBytes: 100
  #How many entries memtable can contain
  MaxSizeEntries: 100
  #Bplus tree configuration
  BPlusTreeDegree: 0
  #SkipList configuration
  SkipListMaxHeight: 0
TokenBucketConfig:
  #How many tokens every user has
  MaxNumTokens: 3
  #Number of seconds between refills
  RefillTime: 60
SSTableConfig:
  TablesRoot: ./TestDataBase/sstable
  SummaryInterval: 40
  MultipleFiles: false
WriteAheadLogConfig:
  SegmentSize: 16
  FilePath: ./TestDataBase/walData
LSMConfig:
  NumLevels: 4
  CompactionFactor: 10

